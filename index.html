<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- 1. Favicon (Logo yawe igaragara hejuru kuri Tab) -->
    <!-- Reba niba logo.jpeg iri muri folder ya public/ cyangwa uyishyiremo -->
    <link rel="icon" type="image/jpeg" href="/src/assets/logo.jpeg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 2. SEO Meta Tags z'ingenzi -->
    <title>IntambweFlow | Master Your Productivity & Finance</title>
    <meta name="description" content="IntambweFlow helps high-achievers track daily tasks, manage finances, and log knowledge in a secure, local-first dashboard. Built for growth." />
    <meta name="keywords" content="productivity tool, finance tracker, daily planner, knowledge log, Rwanda tech, IntambweFlow" />
    <meta name="author" content="IntambweFlow Team" />

    <!-- 3. Open Graph (Ibi bituma iyo u-sharinze link kuri WhatsApp/Facebook ifoto n'amagambo biza neza) -->
    <meta property="og:title" content="IntambweFlow - Level Up Your Daily Life" />
    <meta property="og:description" content="Manage your tasks, capital, and insights in one high-performance dashboard." />
    <meta property="og:image" content="/logo.jpeg" />
    <meta property="og:url" content="https://intambwe-flow-com.vercel.app/" />
    <meta property="og:type" content="website" />

    <!-- 4. Twitter Card (Ibi ni ibya Twitter gusa) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="IntambweFlow" />
    <meta name="twitter:description" content="Your daily mission control for tasks and finance." />
    <meta name="twitter:image" content="/logo.JPG" />

    <!-- 5. Fonts (Google Fonts kugira ngo isomeke neza) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
